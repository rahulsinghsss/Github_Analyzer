<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1120;
        --surface: rgba(15, 23, 42, 0.92);
        --surface-strong: #111827;
        --surface-soft: rgba(255,255,255,0.06);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --primary: #7c3aed;
        --primary-dark: #5b21b6;
        --accent: #38bdf8;
        --border: rgba(148, 163, 184, 0.24);
        --shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
                    radial-gradient(circle at bottom right, rgba(236, 72, 153, 0.16), transparent 24%),
                    var(--bg);
        color: var(--text);
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 30%);
        pointer-events: none;
      }
      .container {
        width: min(1140px, calc(100% - 32px));
        margin: 48px auto;
        padding: 32px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }
      .top {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 24px;
        align-items: start;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.2rem, 2.6vw, 3rem);
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        line-height: 1.8;
        color: var(--muted);
        max-width: 42rem;
      }
      .controls {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
      }
      .controls-group {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      input {
        flex: 1;
        min-width: 200px;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        font-size: 1rem;
        transition: border-color 180ms ease, background 180ms ease;
      }
      input:focus {
        outline: none;
        border-color: rgba(99, 102, 241, 0.8);
        background: rgba(255,255,255,0.1);
      }
      button {
        flex: 1;
        min-width: 140px;
        border: none;
        border-radius: 16px;
        padding: 14px 22px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
        box-shadow: 0 16px 34px rgba(59, 130, 246, 0.16);
        white-space: nowrap;
      }
      button:hover {
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(0);
      }
      button.primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
      }
      button.secondary {
        background: linear-gradient(135deg, #16a34a, #15803d);
        color: white;
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 16px 34px rgba(22, 163, 74, 0.16);
      }
      .status {
        margin-top: 28px;
        padding: 18px 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: var(--text);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }
      .card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 24px;
        padding: 24px;
        min-height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .card h2 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      .meta {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.7;
      }
      .meta strong {
        color: var(--text);
      }
      .avatar {
        width: 82px;
        height: 82px;
        border-radius: 22px;
        object-fit: cover;
        border: 1px solid rgba(148, 163, 184, 0.18);
        margin-bottom: 18px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        word-break: break-all;
      }
      a:hover {
        text-decoration: underline;
      }
      @media (max-width: 860px) {
        .top {
          grid-template-columns: 1fr;
        }
        .controls {
          flex-direction: column;
        }
        .controls-group {
          flex-direction: column;
        }
        input {
          width: 100%;
        }
        button {
          width: 100%;
        }
      }
      @media (max-width: 560px) {
        .container { padding: 24px 18px; }
        .controls {
          flex-direction: column;
        }
        .controls-group {
          flex-direction: column;
        }
        input {
          width: 100%;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <div>
          <h1>GitHub Profile Analyzer</h1>
          <p>Enter a GitHub username and fetch the latest profile analysis.</p>
        </div>
        <div class="controls">
          <input id="username" placeholder="Enter GitHub username" />
          <div class="controls-group">
            <button onclick="fetchProfile()" class="primary">Fetch Data</button>
            <button onclick="showAllProfiles()" class="secondary">Show All Profiles</button>
          </div>
        </div>
      </div>

      <div id="status" class="status">No profile fetched yet.</div>
      <div id="result" class="grid"></div>
    </div>

    <script>
      const apiBase = (() => {
        if (window.location.protocol.startsWith('http')) {
          const hostname = window.location.hostname;
          if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '0.0.0.0') {
            return `${window.location.origin}/api`;
          }
          return '/api';
        }
        return 'http://localhost:3000/api';
      })();

      function renderProfileCard(profile) {
        return `
          <div class="card">
            <img class="avatar" src="${profile.avatar_url || ''}" alt="avatar" />
            <h2>${profile.name || profile.username}</h2>
            <div class="meta">@${profile.username}</div>
            <p>${profile.bio || 'No bio available.'}</p>
            <div class="meta">Location: ${profile.location || 'N/A'} | Company: ${profile.company || 'N/A'}</div>
            <div class="meta">Public Repos: ${profile.public_repos} | Followers: ${profile.followers} | Following: ${profile.following}</div>
            <div class="meta">Popularity Score: ${profile.popularity_score}</div>
            <div class="meta">Profile URL: <a href="${profile.profile_url}" target="_blank">${profile.profile_url}</a></div>
          </div>
        `;
      }

      async function fetchProfile() {
        const username = document.getElementById('username').value.trim();
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        if (!username) {
          status.textContent = 'Please enter a GitHub username.';
          return;
        }

        status.textContent = 'Fetching profile...';
        result.innerHTML = '';

        try {
          // Primary endpoint used by local server
          let response = await fetch(`${apiBase}/profiles/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username })
          });

          // If Vercel returns 404 for this path, try the POST /api/profiles fallback
          if (response.status === 404) {
            response = await fetch(`${apiBase}/profiles`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ username })
            });
          }

          const contentType = (response.headers.get('content-type') || '').toLowerCase();
          let data;
          if (contentType.includes('application/json')) {
            data = await response.json();
          } else {
            const text = await response.text();
            throw new Error(text || 'Unexpected response from server');
          }

          if (!response.ok) {
            throw new Error(data.error || 'Request failed');
          }

          const profile = data.profile;
          result.innerHTML = renderProfileCard(profile);
          status.textContent = `Profile analyzed and saved for ${profile.username}.`;
        } catch (error) {
          status.textContent = error.message || 'Failed to fetch profile.';
        }
      }

      async function showAllProfiles() {
        const status = document.getElementById('status');
        const result = document.getElementById('result');

        status.textContent = 'Loading stored profiles...';
        result.innerHTML = '';

        try {
          const response = await fetch(`${apiBase}/profiles`);
          const contentType = (response.headers.get('content-type') || '').toLowerCase();
          let data;
          if (contentType.includes('application/json')) {
            data = await response.json();
          } else {
            const text = await response.text();
            throw new Error(text || 'Failed to load profiles');
          }

          if (!response.ok) {
            throw new Error(data.error || 'Failed to load profiles');
          }

          const profiles = data.profiles || [];
          if (!profiles.length) {
            result.innerHTML = '<div class="card">No profiles found in the database.</div>';
            status.textContent = 'No stored profiles found.';
            return;
          }

          result.innerHTML = profiles.map(renderProfileCard).join('');
          status.textContent = `Loaded ${profiles.length} stored profile(s).`;
        } catch (error) {
          status.textContent = error.message;
        }
      }
    </script>
  </body>
</html>
